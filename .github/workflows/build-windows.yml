name: build-windows

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          # SQLCipher binding: prebuilt cross-platform wheel (imports as `sqlcipher3`).
          pip install sqlcipher3-wheels
          pip install -r requirements.txt
          pip install pyinstaller
          # Fail early if the binding isn't importable.
          python -c "import sqlcipher3, sqlcipher3.dbapi2; print('sqlcipher3 ok')"

      - name: Smoke test (import + DB encryption)
        run: python -m pytest tests/test_encryption.py tests/test_seed.py -q

      - name: Build executable
        run: pyinstaller khata.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: khata-windows
          path: dist/Khata.exe
          if-no-files-found: error
